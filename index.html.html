/* v4.41 legacy Sakurajuji-inspired refinement retained below; v4.42 overrides it with Livesense-style CSS later. */
:root{
  --sj-ink:#24313a;
  --sj-sub:#7b8790;
  --sj-line:rgba(40,55,68,.105);
  --sj-paper:rgba(255,255,255,.92);
  --sj-mint:#d9f0dc;
  --sj-sky:#d8edf5;
  --sj-sakura:#f8dce6;
  --sj-lemon:#fff0bf;
  --sj-green:#8abf63;
  --sj-coral:#e9967d;
  --sj-blue:#6aa4bf;
  --sj-shadow:0 24px 60px rgba(31,49,64,.12),0 8px 22px rgba(31,49,64,.07),inset 0 1px 0 rgba(255,255,255,.98);
}
html{background:#fbfbf7}
body{
  color:var(--sj-ink);
  background:
    radial-gradient(circle at 12% 8%,rgba(216,237,245,.95) 0,rgba(216,237,245,.48) 24%,rgba(216,237,245,0) 48%),
    radial-gradient(circle at 88% 12%,rgba(248,220,230,.88) 0,rgba(248,220,230,.42) 22%,rgba(248,220,230,0) 48%),
    radial-gradient(circle at 55% 38%,rgba(217,240,220,.80) 0,rgba(217,240,220,.35) 27%,rgba(217,240,220,0) 58%),
    linear-gradient(180deg,#ffffff 0%,#fbfbf6 48%,#f7f8f2 100%);
  padding-top:42px;
}
body:before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:-1;
  background:
    linear-gradient(90deg,rgba(36,49,58,.045) 1px,transparent 1px),
    linear-gradient(180deg,rgba(36,49,58,.038) 1px,transparent 1px);
  background-size:88px 88px;
  mask-image:linear-gradient(180deg,transparent 0%,#000 14%,#000 74%,transparent 100%);
}
header.appbar{
  display:grid;
  grid-template-columns:44px 1fr 52px;
  align-items:center;
  gap:12px;
  max-width:840px;
  min-height:72px;
  padding:12px 18px 10px;
  margin:0 auto 2px;
  position:relative;
  z-index:18;
}
.brandmark{
  width:38px;height:38px;border-radius:13px;
  display:grid;place-items:center;
  color:#fff;font-weight:900;font-size:24px;line-height:1;
  background:linear-gradient(135deg,#8bbf65 0%,#75b5c8 50%,#e8a0b7 100%);
  box-shadow:0 12px 28px rgba(75,104,122,.18),inset 0 1px 0 rgba(255,255,255,.45);
}
.headcopy{text-align:left;min-width:0;padding-left:0}
.headcopy h1{
  font-size:22px;
  color:var(--sj-ink);
  letter-spacing:.035em;
  font-weight:800;
}
.headcopy .small{
  font-size:10.5px;
  color:rgba(36,49,58,.56);
  letter-spacing:.045em;
  text-transform:none;
}
.menu-toggle{
  justify-self:end;
  width:48px;height:48px;min-height:48px;padding:0;border-radius:999px;
  background:rgba(255,255,255,.74);
  border:1px solid rgba(255,255,255,.9);
  box-shadow:0 14px 30px rgba(47,63,78,.14),0 4px 10px rgba(47,63,78,.08),inset 0 1px 0 rgba(255,255,255,.96);
  backdrop-filter:blur(14px);
  display:grid;
  place-items:center;
  gap:0;
  color:var(--sj-ink);
  position:relative;
}
.menu-toggle span{
  position:absolute;
  left:14px;
  width:20px;
  height:2px;
  border-radius:999px;
  background:linear-gradient(90deg,#24313a,#6aa4bf);
  transition:transform .46s cubic-bezier(.19,1,.22,1),opacity .28s ease,top .46s cubic-bezier(.19,1,.22,1),width .36s ease;
}
.menu-toggle span:nth-child(1){top:16px;width:18px}
.menu-toggle span:nth-child(2){top:23px;width:22px}
.menu-toggle span:nth-child(3){top:30px;width:14px}
body.menu-open .menu-toggle span:nth-child(1){top:23px;width:22px;transform:rotate(45deg)}
body.menu-open .menu-toggle span:nth-child(2){opacity:0;transform:translateX(8px) scaleX(.25)}
body.menu-open .menu-toggle span:nth-child(3){top:23px;width:22px;transform:rotate(-45deg)}
.global-menu{
  position:fixed;
  inset:0;
  z-index:16;
  opacity:0;
  pointer-events:none;
  transition:opacity .36s ease;
}
.global-menu.open{opacity:1;pointer-events:auto}
.menu-scrim{
  position:absolute;
  inset:0;
  background:rgba(248,249,244,.58);
  backdrop-filter:blur(13px) saturate(1.05);
}
.menu-panel{
  position:relative;
  max-width:760px;
  margin:96px 18px 0;
  padding:26px 20px 20px;
  border-radius:32px;
  background:
    radial-gradient(circle at 6% 0%,rgba(216,237,245,.95),rgba(216,237,245,0) 36%),
    radial-gradient(circle at 96% 4%,rgba(248,220,230,.9),rgba(248,220,230,0) 34%),
    linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,255,255,.86));
  border:1px solid rgba(255,255,255,.86);
  box-shadow:0 38px 90px rgba(29,47,62,.20),0 12px 30px rgba(29,47,62,.12),inset 0 1px 0 rgba(255,255,255,.98);
  transform:translateY(-20px) scale(.975);
  transition:transform .55s cubic-bezier(.19,1,.22,1),opacity .36s ease;
}
.global-menu.open .menu-panel{transform:translateY(0) scale(1)}
.menu-kicker{
  color:#7aa36a;
  font-size:11px;
  font-weight:800;
  letter-spacing:.18em;
  text-transform:uppercase;
  margin-bottom:10px;
}
.menu-panel h2{
  margin:0;
  font-size:38px;
  line-height:1.12;
  letter-spacing:.08em;
  font-weight:500;
  color:var(--sj-ink);
}
.menu-panel p{
  margin:12px 0 18px;
  color:rgba(36,49,58,.62);
  font-size:13px;
  line-height:1.7;
}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.menu-card{
  text-align:left;
  min-height:86px;
  border-radius:22px;
  padding:15px 14px;
  background:rgba(255,255,255,.72);
  color:var(--sj-ink);
  border:1px solid rgba(36,49,58,.08);
  box-shadow:0 14px 30px rgba(31,49,64,.10),0 4px 10px rgba(31,49,64,.05),inset 0 1px 0 rgba(255,255,255,.95);
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  transform:translateY(12px);
  opacity:0;
  transition:transform .55s cubic-bezier(.19,1,.22,1),opacity .42s ease,background .24s ease,border-color .24s ease;
}

/* v4.42 Livesense-recruit inspired design: bold editorial hero, blue/orange accents, full-screen menu motion, and safer top offset for Scriptable chrome */
:root{
  --ls-ink:#101820;

  --ls-orange:#ff9500;
  --ls-cream:#fbf7ef;
  --ls-paper:#ffffff;
  --ls-line:rgba(16,24,32,.105);
  --ls-shadow:0 22px 54px rgba(16,24,32,.105),0 6px 16px rgba(16,24,32,.055);

}
html{background:#f7f8fa}
body{

  background:
    linear-gradient(90deg,rgba(0,166,223,.045) 1px,transparent 1px),
    linear-gradient(180deg,rgba(16,24,32,.035) 1px,transparent 1px),

    radial-gradient(circle at 110% 8%,rgba(255,149,0,.13),rgba(255,149,0,0) 26%),
    linear-gradient(180deg,#ffffff 0%,#f6f8fb 46%,#f3f6f9 100%);
  background-size:72px 72px,72px 72px,auto,auto,auto;
  padding-top:var(--ls-top-gap)!important;
  letter-spacing:.005em;
}
body:before{
  background:none!important;
  mask-image:none!important;
}
header.appbar{
  grid-template-columns:74px 1fr 102px!important;

}

  letter-spacing:.13em!important;
  box-shadow:10px 10px 0 rgba(0,166,223,.18)!important;

.brandmark:after{
  content:"";

.menu-toggle{

.menu-toggle:after{

  font-weight:950;

  background:var(--ls-ink)!important;

.menu-toggle span:nth-child(1){top:17px!important;width:28px!important}
.menu-toggle span:nth-child(2){top:25px!important;width:22px!important}

    0 10px 34px rgba(18,35,63,.15),

  -webkit-backdrop-filter:blur(24px) saturate(180%)!important;

  transition:transform .32s cubic-bezier(.2,.8,.2,1),padding .28s ease,border-radius .28s ease!important;

}

  content:"";

  inset:0;

function simulateCombinedLoan(balance, annualRate, monthlyPay, bonusPay, months, startDate){
  balance=Math.max(0,n(balance)); annualRate=Math.max(0,n(annualRate)); monthlyPay=Math.max(0,n(monthlyPay)); bonusPay=Math.max(0,n(bonusPay)); months=Math.max(0,Math.round(n(months)||0));
  var r=annualRate/100/12, interest=0,total=0, rows=[];
  for(var i=0;i<months && balance>0.5;i++){
    var intr=balance*r; interest+=intr; balance+=intr;
    var pay=monthlyPay+(isBonusMonthFromStart(startDate,i)?bonusPay:0);
    pay=Math.min(pay,balance); balance-=pay; total+=pay;
    if(i<12 || (i+1)%12===0 || balance<=0.5){rows.push({month:i+1,balance:Math.max(0,balance),interest:interest,total:total,bonus:isBonusMonthFromStart(startDate,i)});}
  }
  return {months:months,interest:interest,total:total,lastBalance:Math.max(0,balance),rows:rows};
}
function solveBonusPayment(balance, annualRate, monthlyPay, targetMonths, startDate){
  balance=Math.max(0,n(balance)); targetMonths=Math.min(240,Math.max(1,Math.round(n(targetMonths)||240)));
  if(balance<=0)return 0;
  var noBonus=simulateCombinedLoan(balance,annualRate,monthlyPay,0,targetMonths,startDate);
  if(noBonus.lastBalance<=1)return 0;
  var lo=0, hi=Math.max(balance,100000);
  for(var h=0;h<40;h++){var test=simulateCombinedLoan(balance,annualRate,monthlyPay,hi,targetMonths,startDate); if(test.lastBalance<=1)break; hi*=2;}
  for(var i=0;i<50;i++){var mid=(lo+hi)/2; var sim=simulateCombinedLoan(balance,annualRate,monthlyPay,mid,targetMonths,startDate); if(sim.lastBalance>1)lo=mid; else hi=mid;}
  return Math.ceil(hi);
}
function loanBalanceNow(){
  var s=state&&state.settings?state.settings:{};
  if(s.studentLoanPlanRegistered&&s.studentLoanPlanStart){
    var elapsed=monthsBetweenDates(s.studentLoanPlanStart,new Date());
    var sim=simulateCombinedLoan(s.studentLoanOpeningBalance||s.studentLoanBalance,s.studentLoanRate||0,s.studentLoanMonthly||0,s.studentLoanBonus||0,elapsed,s.studentLoanPlanStart);
    return Math.max(0,sim.lastBalance);
  }
  return n(s.studentLoanBalance);
}

function nextLoanPayments(months){
  var s=state&&state.settings?state.settings:{};
  months=Math.max(1,Math.round(n(months)||12));
  var balance=loanBalanceNow();
  var total=0;
  if(balance>0){
    var monthly=n(s.studentLoanMonthly);
    var bonus=n(s.studentLoanBonus);
    for(var i=0;i<months;i++){
      var d=new Date();
      d.setMonth(d.getMonth()+i);
      var pay=monthly;
      var m=d.getMonth()+1;
      if(m===1||m===7)pay+=bonus;
      total+=pay;
    }
    total=Math.min(balance,total);
  }
  return total;
}
function nextDebtPayments(months){return nextLoanPayments(months)+fixedLoanPayments(months)}

function practicalNetWorthCurrent(){return totalAssetsCurrent()-nextDebtPayments(12)}

function pad2(v){return String(v).padStart(2,'0')}
function formatDateTime(v){
  if(!v)return '未実施';
  var d=new Date(v);
  if(isNaN(d.getTime()))return '未実施';
  return d.getFullYear()+'/'+pad2(d.getMonth()+1)+'/'+pad2(d.getDate())+' '+pad2(d.getHours())+':'+pad2(d.getMinutes());
}
function daysSince(v){
  if(!v)return null;
  var d=new Date(v);
  if(isNaN(d.getTime()))return null;
  return Math.max(0,Math.floor((Date.now()-d.getTime())/86400000));
}

    var row=nodes[i].closest&&nodes[i].closest('.listitem,.salary-history-item,.investment-history-item,.special-item,.fixed-item,.tx-item,.repayment-row');

function animateItemRemoval(id,done){
  var row=findRenderedItemById(id);

  var rect=row.getBoundingClientRect();
  row.style.height=Math.max(1,rect.height)+'px';
  row.style.maxHeight=Math.max(1,rect.height)+'px';
  row.style.overflow='hidden';
  row.style.transformOrigin='center center';

function nisaChart(){
  var controls=nisaRangeTabsHtml();
  var all=(state.nisa||[]).slice().sort(function(a,b){return String(a.date).localeCompare(String(b.date))});
  if(all.length<2)return controls+'<p class="small">NISA月次を2件以上入力すると表示されます。</p>';
  var cumulative=0,monthlyLatest={};
  all.forEach(function(row){
    cumulative+=n(row.contribution);
    var key=ym(row.date);
    monthlyLatest[key]={row:row,principal:cumulative,month:key};
  });
  var monthly=Object.keys(monthlyLatest).sort().map(function(key){return monthlyLatest[key]});
  if(monthly.length<2)return controls+'<p class="small">異なる月のNISA記録を2か月以上入力すると表示されます。</p>';
  function monthNumber(key){var p=String(key).split('-');return Number(p[0])*12+Number(p[1])-1}
  var endMonth=monthNumber(monthly[monthly.length-1].month);
  var rangeMonths=nisaChartRange==='1y'?12:(nisaChartRange==='3y'?36:0);
  var arr=rangeMonths?monthly.filter(function(item){return monthNumber(item.month)>=endMonth-rangeMonths+1}):monthly;
  if(arr.length<2)return controls+'<p class="small">選択した期間内に、異なる月の記録が2件以上必要です。</p>';
  var W=640,H=320,L=72,R=26,T=46,B=58;
  var vals=[],ptsPrincipal=[],ptsValue=[],labels=[];
  for(var i=0;i<arr.length;i++){
    vals.push(arr[i].principal,n(arr[i].row.value));
    ptsPrincipal.push(arr[i].principal);
    ptsValue.push(n(arr[i].row.value));
    labels.push(arr[i].month);
  }
  var max=Math.max.apply(null,vals.concat([1])),min=Math.min.apply(null,vals.concat([0]));
  if(max===min){max+=1;min-=1}
  var span=max-min;max+=span*.16;min-=span*.10;
  function xy(v,i){var x=L+(W-L-R)*(i/(arr.length-1));var y=T+(H-T-B)*(1-(v-min)/(max-min||1));return [x,y]}
  function poly(list){return list.map(function(v,i){var p=xy(v,i);return p[0].toFixed(1)+','+p[1].toFixed(1)}).join(' ')}
  function yPos(v){return T+(H-T-B)*(1-(v-min)/(max-min||1))}
  function shortY(v){var a=Math.abs(v);if(a>=100000000)return (v/100000000).toFixed(1)+'億';if(a>=10000)return Math.round(v/10000)+'万';return Math.round(v).toString()}
  var ticks=[min,(min+max)/2,max],grid='';
  for(var t=0;t<ticks.length;t++){
    var y=yPos(ticks[t]);
    grid+='<line x1="'+L+'" y1="'+y.toFixed(1)+'" x2="'+(W-R)+'" y2="'+y.toFixed(1)+'" class="chart-grid"/><text x="'+(L-10)+'" y="'+(y+4).toFixed(1)+'" text-anchor="end" class="chart-axis-label">'+shortY(ticks[t])+'</text>';
  }
  var xlabels='',step=Math.max(1,Math.ceil(labels.length/4));
  for(var j=0;j<labels.length;j+=step){var p=xy(ptsPrincipal[j],j);xlabels+='<text x="'+p[0].toFixed(1)+'" y="'+(H-22)+'" text-anchor="middle" class="chart-axis-label">'+labels[j].slice(2).replace('-','/')+'</text>'}
  var last=labels.length-1;
  if((last%step)!==0){var p2=xy(ptsPrincipal[last],last);xlabels+='<text x="'+p2[0].toFixed(1)+'" y="'+(H-22)+'" text-anchor="middle" class="chart-axis-label">'+labels[last].slice(2).replace('-','/')+'</text>'}
  var points='';
  var maxMarkers=nisaChartRange==='1y'?12:18;
  var markerCount=Math.min(maxMarkers,arr.length),markerIndexes={};
  for(var marker=0;marker<markerCount;marker++){
    var markerIndex=markerCount===1?0:Math.round(marker*(arr.length-1)/(markerCount-1));
    markerIndexes[markerIndex]=true;
  }
  for(var k=0;k<arr.length;k++){
    if(!markerIndexes[k])continue;
    var pv=xy(ptsValue[k],k),pp=xy(ptsPrincipal[k],k);
    points+='<g class="chart-hit" role="button" tabindex="0" aria-pressed="false" data-date="'+esc(arr[k].row.date)+'" data-label="元本" data-amount="'+esc(yen(ptsPrincipal[k]))+'" aria-label="'+esc(arr[k].row.date)+' 元本 '+yen(ptsPrincipal[k])+'" onclick="showNisaPointFromEl(this,event)" onkeydown="if(event.keyCode===13||event.keyCode===32){showNisaPointFromEl(this,event)}"><circle cx="'+pp[0].toFixed(1)+'" cy="'+pp[1].toFixed(1)+'" r="17" class="chart-hit-target"></circle><circle cx="'+pp[0].toFixed(1)+'" cy="'+pp[1].toFixed(1)+'" r="4.8" class="chart-point principal"></circle></g>';
    points+='<g class="chart-hit" role="button" tabindex="0" aria-pressed="false" data-date="'+esc(arr[k].row.date)+'" data-label="評価額" data-amount="'+esc(yen(ptsValue[k]))+'" aria-label="'+esc(arr[k].row.date)+' 評価額 '+yen(ptsValue[k])+'" onclick="showNisaPointFromEl(this,event)" onkeydown="if(event.keyCode===13||event.keyCode===32){showNisaPointFromEl(this,event)}"><circle cx="'+pv[0].toFixed(1)+'" cy="'+pv[1].toFixed(1)+'" r="17" class="chart-hit-target"></circle><circle cx="'+pv[0].toFixed(1)+'" cy="'+pv[1].toFixed(1)+'" r="4.8" class="chart-point value"></circle></g>';
  }
  var svg='<div class="ahamo-chart-wrap"><div class="chart-legend"><span class="principal">元本</span><span class="value">評価額</span></div><div id="nisaPointInfo" class="nisa-point-info" aria-live="polite"><span>グラフの点をタップ</span><span>入力日と金額を表示します</span></div><svg class="nisa-chart" viewBox="0 0 '+W+' '+H+'" role="img" aria-label="NISA元本と評価額の推移">'+grid+xlabels+'<polyline points="'+poly(ptsPrincipal)+'" class="chart-line principal"/><polyline points="'+poly(ptsValue)+'" class="chart-line value"/>'+points+'</svg></div>';
  return controls+svg+'<p class="small chart-note">各月の最新記録を表示します。長期表示では見やすさのためタップ用の点を間引いています。</p>';

}

function loanPaymentDateLabel(startDate,monthIndex){
  var parts=String(startDate||today()).split('-');
  var y=Number(parts[0])||new Date().getFullYear();
  var m=(Number(parts[1])||1)-1;
  var day=Number(parts[2])||1;
  var first=new Date(y,m+Math.max(0,n(monthIndex)),1);
  var lastDay=new Date(first.getFullYear(),first.getMonth()+1,0).getDate();
  var d=new Date(first.getFullYear(),first.getMonth(),Math.min(day,lastDay));
  return d.getFullYear()+'/'+pad2(d.getMonth()+1)+'/'+pad2(d.getDate());
}

function makeBackupJson(){

function backupFileName(){
  var stamp=new Date().toISOString().replace(/[-:]/g,'').replace(/\..+$/,'').replace('T','-');
  return 'assetmemo-encrypted-backup-v438-'+stamp+'.json';
}
window.saveBackupAsFile=async function(){
  try{
    var text=makeBackupJson();
    markBackupNow();
    var filename=backupFileName();
    if(typeof File!=='undefined' && navigator.share){
      var file=new File([text],filename,{type:'application/json'});
      var shareData={files:[file],title:filename,text:'資産メモの暗号化バックアップです。'};
      if(!navigator.canShare || navigator.canShare(shareData)){
        await navigator.share(shareData);
        var out=$('backupOut');
        if(out)out.innerHTML='<div class="backup-box"><p class="small okText">共有画面を開きました。</p><p class="small">「ファイルに保存」などを選んで、JSONファイルとして保存してください。</p></div>';
        var last=$('backupLastLine'); if(last)last.textContent='最終バックアップ：'+formatDateTime(state.settings.lastBackupAt);
        toast('共有画面を開きました');
        return;
      }
    }
    exportBackup();
    toast('ファイル共有が使えないため、JSONを表示しました');
  }catch(e){
    if(String(e&&e.name||'')==='AbortError'){toast('保存をキャンセルしました');return}
    exportBackup();
    toast('ファイル保存が使えないため、JSONを表示しました');
    setDebug(String(e&&e.stack||e));
  }
}

    setTimeout(function(){var ta=$('backup_text'); if(ta){ta.focus(); ta.select();}},80);

// v4.77: smoother iOS-style tab bar, five-second addition confirmation, and unified native date picker.
(function(){
  const bar=document.getElementById('nav');
  if(!bar) return;
  let lastY=window.scrollY||0;
  let downTravel=0;
  let upTravel=0;
  let ticking=false;
  let compact=bar.classList.contains('ios26-compact');
  let lastToggle=0;

  const setCompact=(next)=>{
    if(next===compact) return;
    const now=performance.now();
    if(now-lastToggle<180) return;
    compact=next;
    lastToggle=now;
    bar.classList.toggle('ios26-compact',next);
    downTravel=0;
    upTravel=0;
  };

  const update=()=>{
    const y=Math.max(0,window.scrollY||0);
    const delta=y-lastY;
    if(Math.abs(delta)>.5){
      if(delta>0){
        downTravel=Math.min(80,downTravel+delta);
        upTravel=Math.max(0,upTravel-delta*.7);
      }else{
        upTravel=Math.min(80,upTravel-delta);
        downTravel=Math.max(0,downTravel+delta*.7);
      }
    }

    if(y<34){
      setCompact(false);
    }else if(!compact && y>88 && downTravel>30){
      setCompact(true);
    }else if(compact && upTravel>22){
      setCompact(false);
    }

    lastY=y;
    ticking=false;
  };

  window.addEventListener('scroll',()=>{
    if(!ticking){
      ticking=true;
      requestAnimationFrame(update);
    }
  },{passive:true});

  bar.addEventListener('click',()=>setCompact(false));
})();

// v4.86: Scriptable's iOS WebView can move fixed elements above the software keyboard.
// Temporarily move the tab bar out while an editable control or native picker is active.
(function(){
  const root=document.body;
  const viewport=window.visualViewport;
  let restoreTimer=null;

  const isEditable=(el)=>{
    if(!el||el.disabled||el.readOnly) return false;
    const tag=String(el.tagName||'').toLowerCase();
    if(tag==='textarea'||tag==='select') return true;
    if(tag!=='input') return false;
    const type=String(el.type||'text').toLowerCase();
    return !/^(button|submit|reset|checkbox|radio|file|hidden|range|color)$/.test(type);
  };

  const viewportHasKeyboard=()=>{
    if(!viewport) return false;
    const full=Math.max(window.innerHeight||0,document.documentElement.clientHeight||0);
    return full>0&&viewport.height<full*.78;
  };

  const setKeyboardOpen=(open)=>{
    if(restoreTimer){clearTimeout(restoreTimer);restoreTimer=null;}
    root.classList.toggle('keyboard-open',!!open);
  };

  document.addEventListener('focusin',(event)=>{
    if(isEditable(event.target)) setKeyboardOpen(true);
  });

  document.addEventListener('focusout',()=>{
    if(restoreTimer) clearTimeout(restoreTimer);
    restoreTimer=setTimeout(()=>{
      restoreTimer=null;
      const active=document.activeElement;
      if(!isEditable(active)&&!viewportHasKeyboard()) root.classList.remove('keyboard-open');
    },220);
  });

  if(viewport){
    viewport.addEventListener('resize',()=>{
      if(viewportHasKeyboard()) setKeyboardOpen(true);
      else if(!isEditable(document.activeElement)){
        if(restoreTimer) clearTimeout(restoreTimer);
        restoreTimer=setTimeout(()=>{restoreTimer=null;root.classList.remove('keyboard-open')},180);
      }
    },{passive:true});
  }
})();
